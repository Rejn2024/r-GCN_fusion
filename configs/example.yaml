neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: password
  database: neo4j

data:
  hypotheses: [benign, suspicious]
  # Baseline candidate-level scores plus richer optional ESM/candidate features.
  recommended_candidate_features: true
  feature_properties:
    - degree_score
    - text_score
    - recency_score
  # Each training node should contain a mass list matching rgcn_fusion.dempster_shafer.subset_masks:
  # length 2**len(hypotheses)-1 when len(hypotheses) <= 10, otherwise singleton-plus-uncertainty length len(hypotheses)+1.
  # For two hypotheses, order is: {benign}, {suspicious}, {benign,suspicious}.
  label_property: ds_masses
  # Enable node-level categorical classification alongside evidential masses.
  # The default tasks include radar type, radar mode, aircraft variant, and operator country.
  classification: true
  classification_label_properties:
    radar_type: radar_id
    radar_mode: mode_id
    aircraft_variant: aircraft_id
    operator_country: operator_country
  # Leakage-safe classification controls:
  # - train/evaluate supervised losses only on Observation nodes, so CandidateEvidence
  #   mode_id values are not treated as ground-truth radar-mode labels;
  # - split whole series/observations together when a grouping property is present;
  # - remove candidate-derived or truth-only relations from the message-passing graph.
  supervised_node_labels: [Observation]
  split_group_property: series_id
  remove_cross_split_edges: true
  exclude_relation_types:
    - GROUND_TRUTH_CANDIDATE
    - SHARES_BEST_MODE
  node_query: |
    MATCH (n:EvidenceEntity)
    RETURN elementId(n) AS id, properties(n) AS props, labels(n) AS labels
    ORDER BY id
  edge_query: |
    MATCH (s:EvidenceEntity)-[r]->(t:EvidenceEntity)
    RETURN elementId(s) AS source, elementId(t) AS target, type(r) AS type
    ORDER BY source, target, type

model:
  hidden_features: 128
  num_layers: 5
  num_bases: 4
  dropout: 0.2
  residual: true
  normalization: layernorm
  relation_gates: true
  task_head_hidden_features: 128
  mass_head_type: dirichlet
  # Recompute r-GCN block activations during backward to lower CUDA memory use.
  gradient_checkpointing: true

training:
  epochs: 200
  # Set >0 to train with mini-batches and show a fresh Keras-style batch progress bar per epoch.
  # Defaults to full-batch training when omitted or set to 0.
  batch_size: 0
  learning_rate: 0.001
  weight_decay: 0.0001
  l1_lambda: 0.00001
  # Stronger overtraining prevention: smooth hard labels, discourage low-entropy
  # memorization, clip gradients, and reduce LR when validation loss plateaus.
  mass_label_smoothing: 0.01
  classification_label_smoothing: 0.05
  confidence_penalty_weight: 0.01
  max_grad_norm: 1.0
  reduce_lr_on_plateau: true
  lr_patience: 3
  lr_factor: 0.5
  classification_loss_weight: 1.0
  # Per-task multipliers prioritize these accuracy metrics during training.
  classification_task_loss_weights:
    aircraft_variant: 2.0
    operator_country: 2.0
  patience: 8
  early_stopping_min_delta: 0.0001
  device: cpu

output:
  directory: artifacts
