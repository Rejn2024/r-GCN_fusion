neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: password
  database: neo4j

data:
  hypotheses: [benign, suspicious]
  # Baseline candidate-level scores plus richer optional ESM/candidate features.
  recommended_candidate_features: true
  feature_properties:
    - degree_score
    - text_score
    - recency_score
  # Each training node should contain a list of length 2**len(hypotheses)-1.
  # For two hypotheses, order is: {benign}, {suspicious}, {benign,suspicious}.
  label_property: ds_masses
  # Enable node-level categorical classification alongside evidential masses.
  # The default tasks include radar type, radar mode, aircraft variant, and operator.
  classification: true
  classification_label_properties:
    radar_type: radar_id
    radar_mode: mode_id
    aircraft_variant: aircraft_id
    operator: operator
  node_query: |
    MATCH (n:EvidenceEntity)
    RETURN elementId(n) AS id, properties(n) AS props
    ORDER BY id
  edge_query: |
    MATCH (s:EvidenceEntity)-[r]->(t:EvidenceEntity)
    RETURN elementId(s) AS source, elementId(t) AS target, type(r) AS type
    ORDER BY source, target, type

model:
  hidden_features: 128
  num_layers: 5
  num_bases: 4
  dropout: 0.2
  residual: true
  normalization: layernorm
  relation_gates: true
  task_head_hidden_features: 128
  mass_head_type: dirichlet

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0001
  classification_loss_weight: 1.0
  device: cpu

output:
  directory: artifacts
